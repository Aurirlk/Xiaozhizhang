# ==================== MQTT 配置 ====================
MQTT:
  broker: "${MQTT_BROKER}"
  port: 1883
  client_id: "neuvox_client"
  username: "${MQTT_USERNAME}"
  password: "${MQTT_PASSWORD}"

# ==================== Embedding 配置 ====================
MCP:
  enabled: true

# ==================== Embedding 配置 ====================
Embedding:
  model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  dimension: 384
  device: "cpu"
  batch_size: 32

# ==================== 服务器配置 ====================
server:
  host: 0.0.0.0
  port: 8000
  debug: true

# ==================== Web UI 配置 ====================
web_ui:
  host: 127.0.0.1
  port: 7860

# ==================== WebSocket 配置 ====================
websocket:
  host: 0.0.0.0
  port: 8001

# ==================== OTA 配置 ====================
ota:
  host: 0.0.0.0
  port: 8003

# ==================== 数据库配置 ====================
database:
  type: sqlite
  url: sqlite+aiosqlite:///./xiaozhi.db

# ==================== 成本控制 ====================
cost:
  daily_limit: 10.0
  monthly_limit: 200.0
  warn_threshold: 0.8
